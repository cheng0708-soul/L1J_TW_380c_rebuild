# ========================= 掛機魔法/回城/瞬移綜合設定 =========================
# 指令關鍵字（可用來打開掛機 UI/功能；若你的後台已有，保留原值）
guaji = .afk

# 地圖禁用技能（逗號分隔技能ID）
Guaji_map_stopskill = 

# 魔法施放：允許自動施放的技能（順序保留）
Guaji_magic_allowed = 132,187,87
# 魔法施放：預設註冊的技能（玩家第一次開啟 UI 時的預設）
Guaji_magic_registered_default = 132,187

# 技能公共冷卻（秒）對應表（skillId:sec，逗號分隔）
Guaji_magic_cast_sec_map = 132:3,87:15,187:8

# 瞬移（野外隨機傳送）設定
Guaji_tele = true
# 瞬移所需道具與數量（40100=瞬移卷；若伺服器允許免費瞬移可將數量設 0 或將 Guaji_tele 設 false）
Guaji_tele_item = 40100
Guaji_tele_itemcount = 1

# 回城設定
# 使用城鎮 API（依角色家鄉）回城；若關閉則用下列固定座標
Guaji_return_use_townapi = true
Guaji_return_map = 4
Guaji_return_x = 33437
Guaji_return_y = 32809
Guaji_return_head = 5

# 施法射程設定（全域預設 & 個別技能覆寫）
# 全域預設射程（未覆寫者使用此值）
Guaji_magic_cast_range = 12
# 個別技能覆寫（skillId:range；逗號分隔）
Guaji_magic_cast_range_map = 132:10,87:1,187:1
