# ===== AFK 掛機系統設定（可直接覆蓋 config/afk.properties） =====
# 註：本檔列出「會牽動核心」的所有可用後台鍵，並附上建議/預設值。
# 每個鍵都對應 AfkConfig / AfkSettings / AttackSkillFilters / AfkWallConfig 等載入點。

# --- 核心開關與除錯 ---
# 啟用掛機核心
Afk_enabled = true
# 內部除錯輸出（大量 log，建議正式服關閉）
Afk_debug = false

# --- 近戰/遠程距離設定 ---
# 近戰追擊時允許的最遠距離（格）
Afk_melee_chase_range = 4
# 遠程有效射程（最大/最小）；最小建議保持 0~2，避免近身硬射
Afk_ranged_max_range = 8
Afk_ranged_min_range = 2

# --- 視線 / 彈道檢查 ---
# 是否檢查與目標之間的直線視線（LOS）
Afk_check_los = true
# 是否檢查彈道階梯（軌跡）
Afk_check_trajectory = true
# LOS 檢查最多步數（Bresenham/逐格上限）
Afk_los_step_limit = 24

# --- 路徑尋路（遇障礙繞路） ---
# 啟用路徑尋路（遇障礙嘗試繞過）
Afk_use_pathfinding = true
# 尋路單次最多步數
Afk_pf_max_steps = 32
# 尋路失敗重試次數
Afk_pf_retry_limit = 3
# 判定卡住的 tick 數（達到後視為卡點）
Afk_pf_stuck_ticks = 6

# --- 戰鬥行為 ---
# 若連續此毫秒數內沒有造成有效傷害，視為脫戰（重新選目標或巡邏）
Afk_combat_timeout_ms = 6000
# 重新站位（微調走位）冷卻（毫秒）
Afk_reposition_cooldown_ms = 1500

# --- 傳送與回城（供 AI 使用的合法手段） ---
# 允許自由傳送（/teleport、瞬移等）
Afk_allow_free_teleport = true
# 允許使用傳送卷軸
Afk_allow_scroll_teleport = true
# 允許使用回家的卷軸（回到城鎮）
Afk_allow_home_scroll = true
# 回家所對應的城鎮 ID（依伺服器地圖設定）
Afk_hometown_id = 0

# --- 切換用道具（開/關掛機的按鈕） ---
# 右鍵此道具即可開/關掛機模式
Afk_toggle_item_id = 240101

# --- 技能優先順序 / 距離覆蓋 ---
# 技能施放優先順序（逗號分隔的 skillId；優先度由左到右遞減）
Afk_magic_priority = 
# 指定技能的施放距離覆蓋（格式：skillId:range,skillId:range）
Afk_skill_range_map = 132:10

# --- 牆後怪/空氣牆判定（對應 AfkWallConfig） ---
# 啟用牆後/障礙偵測與忽略邏輯（啟用後：遠程會嘗試走位以取得有效彈道）
Afk_walljudge_enabled = true
# LOS 步數上限（牆判定）
Afk_wall_los_step_limit = 20
# 僅在距離 <= 此值時嚴格檢查牆（建議與遠程射程一致 10）
Afk_wall_range_check = 10
# 當目標距離 > 此值時自動清除忽略清單（避免卡住）
Afk_wall_ignore_radius = 25
# 重新檢查的間隔（毫秒）
Afk_wall_recheck_ms = 300
# 一旦成功造成傷害是否清空忽略清單
Afk_wall_clear_on_hit = true
# 牆判定除錯輸出
Afk_wall_debug = false

# --- 攻擊技能白名單（會被視為有效攻擊技能） ---
# 逗號分隔的 skillId。例如：87,132,187（衝暈/三重矢/屠宰者）
Afk_attack_skill_whitelist = 

# --- 職業專屬技能白名單（每個職業一組） ---
# 格式：Afk_class_skill_whitelist.<ClassKey>=skillId,skillId
# 例如：Afk_class_skill_whitelist.CROWN=87,132
# 常見 ClassKey：CROWN, KNIGHT, ELF, WIZARD, DARKELF, DRAGONKNIGHT, ILLUSIONIST 等
# （保留空值代表不覆蓋）
Afk_class_skill_whitelist.CROWN = 
Afk_class_skill_whitelist.KNIGHT = 
Afk_class_skill_whitelist.ELF = 
Afk_class_skill_whitelist.WIZARD = 
Afk_class_skill_whitelist.DARKELF = 
Afk_class_skill_whitelist.DRAGONKNIGHT = 
Afk_class_skill_whitelist.ILLUSIONIST = 

# --- 舊版兼容（若你的外掛/腳本有讀取） ---
# 允許的魔法清單（同白名單概念），逗號分隔 skillId
Guaji_magic_allowed = 

# 遠程出手前做投射線檢查；若被空氣牆擋住，單步微調再打
RANGED_ARROW_PROBE = true

# 忽略會隱藏/潛地/飛天等的怪（隱藏時視同不存在）
Afk_ignore_hidden_mobs = true